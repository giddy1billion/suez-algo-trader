name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: suezacr.azurecr.io
  IMAGE_NAME: suez-algo-trader
  CONTAINER_NAME: suez-algo-trader
  RESOURCE_GROUP: g1b

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZ_CREDENTIALS }}

      - name: Deploy to Azure Container Instances
        run: |
          az container create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.CONTAINER_NAME }}" \
            --image "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --os-type Linux \
            --registry-login-server "${{ env.ACR_LOGIN_SERVER }}" \
            --registry-username "${{ secrets.ACR_USERNAME }}" \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --cpu 1 --memory 2 \
            --restart-policy Always \
            --secure-environment-variables \
              TRADING_MODE="${{ secrets.TRADING_MODE }}" \
              ALPACA_PAPER_API_KEY="${{ secrets.ALPACA_PAPER_API_KEY }}" \
              ALPACA_PAPER_SECRET_KEY="${{ secrets.ALPACA_PAPER_SECRET_KEY }}" \
              ALPACA_LIVE_API_KEY="${{ secrets.ALPACA_LIVE_API_KEY }}" \
              ALPACA_LIVE_SECRET_KEY="${{ secrets.ALPACA_LIVE_SECRET_KEY }}" \
              TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --log-analytics-workspace "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}" \
            --log-analytics-workspace-key "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}" \
            --command-line "python main.py --interval 60"

      - name: Verify deployment
        run: |
          sleep 15
          STATE=$(az container show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.CONTAINER_NAME }}" \
            --query "instanceView.state" -o tsv)

          echo "Container state: $STATE"

          if [ "$STATE" != "Running" ]; then
            echo "::error::Container failed to start. State: $STATE"
            az container logs \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --name "${{ env.CONTAINER_NAME }}" || true
            exit 1
          fi

          az container show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.CONTAINER_NAME }}" \
            --query "{Status:instanceView.state, Image:containers[0].image, StartTime:containers[0].instanceView.currentState.startTime}" \
            --output table
