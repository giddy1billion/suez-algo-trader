name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "Git SHA to rollback to (leave empty for latest)"
        required: false
        default: ""

env:
  IMAGE_NAME: suez-algo-trader
  CONTAINER_NAME: suez-algo-trader

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.export.outputs.image_tag }}
      image_latest: ${{ steps.export.outputs.image_latest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZ_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Determine image tag
        id: meta
        run: |
          REGISTRY="${{ secrets.ACR_NAME }}"
          IMAGE="${{ env.IMAGE_NAME }}"
          SHA="${{ github.event.inputs.rollback_sha || github.sha }}"

          if [ -z "${REGISTRY}" ]; then
            echo "::error::ACR_NAME secret is not set"
            exit 1
          fi
          if [ -z "${SHA}" ]; then
            SHA="${{ github.sha }}"
          fi

          IMAGE_TAG="${REGISTRY}.azurecr.io/${IMAGE}:${SHA}"
          IMAGE_LATEST="${REGISTRY}.azurecr.io/${IMAGE}:latest"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved image_tag=${IMAGE_TAG}"

      - name: Export outputs
        id: export
        run: |
          echo "image_tag=${{ steps.meta.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${{ steps.meta.outputs.image_latest }}" >> "$GITHUB_OUTPUT"

      - name: Validate outputs
        run: |
          echo "meta.image_tag=${{ steps.meta.outputs.image_tag }}"
          echo "export.image_tag=${{ steps.export.outputs.image_tag }}"
          if [ -z "${{ steps.export.outputs.image_tag }}" ]; then
            echo "::error::image_tag is empty after export"
            exit 1
          fi

      - name: Build and push image
        run: |
          docker build -t "${{ steps.export.outputs.image_tag }}" -t "${{ steps.export.outputs.image_latest }}" .
          docker push "${{ steps.export.outputs.image_tag }}"
          docker push "${{ steps.export.outputs.image_latest }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZ_CREDENTIALS }}

      - name: Validate image tag
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          echo "Received image_tag=${IMAGE_TAG}"
          if [ -z "${IMAGE_TAG}" ]; then
            echo "::error::Image tag output is empty from build job"
            exit 1
          fi

      - name: Deploy to Azure Container Instances
        run: |
          az container create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.CONTAINER_NAME }}" \
            --image "${{ needs.build-and-push.outputs.image_tag }}" \
            --registry-login-server "${{ secrets.ACR_NAME }}.azurecr.io" \
            --registry-username "${{ secrets.ACR_USERNAME }}" \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --cpu 1 --memory 2 \
            --restart-policy Always \
            --secure-environment-variables \
              TRADING_MODE="${{ secrets.TRADING_MODE }}" \
              ALPACA_PAPER_API_KEY="${{ secrets.ALPACA_PAPER_API_KEY }}" \
              ALPACA_PAPER_SECRET_KEY="${{ secrets.ALPACA_PAPER_SECRET_KEY }}" \
              ALPACA_LIVE_API_KEY="${{ secrets.ALPACA_LIVE_API_KEY }}" \
              ALPACA_LIVE_SECRET_KEY="${{ secrets.ALPACA_LIVE_SECRET_KEY }}" \
              TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --log-analytics-workspace "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}" \
            --log-analytics-workspace-key "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}" \
            --command-line "python main.py --telegram --interval 60"

      - name: Wait for container to start
        run: sleep 15

      - name: Verify deployment
        run: |
          STATE=$(az container show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.CONTAINER_NAME }}" \
            --query "instanceView.state" -o tsv)

          echo "Container state: $STATE"

          if [ "$STATE" != "Running" ]; then
            echo "::error::Container failed to start. State: $STATE"
            echo "--- Container logs ---"
            az container logs \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.CONTAINER_NAME }}" || true
            exit 1
          fi

          az container show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.CONTAINER_NAME }}" \
            --query "{Status:instanceView.state, Image:containers[0].image, StartTime:containers[0].instanceView.currentState.startTime}" \
            --output table
